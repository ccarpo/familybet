{% extends "base.html" %}

{% block title %}Login - FamilyBet{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold mb-6 text-center">🔐 Anmelden</h1>
        
        {% if magic_link %}
        <div class="bg-blue-50 border border-blue-300 rounded-lg p-4 mb-4">
            <p class="text-sm text-blue-800 mb-2">Dein Magic-Link:</p>
            <a href="{{ magic_link }}" class="text-blue-600 underline break-all text-sm">{{ magic_link }}</a>
        </div>
        {% endif %}
        
        <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required 
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="deine@email.de">
            </div>
            
            <button type="submit" 
                    class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                Magic-Link anfordern
            </button>
        </form>
        
        <div class="mt-6 text-center text-sm text-gray-600">
            <p>Kein Account? Kontaktiere den Admin.</p>
            <p class="mt-2 text-xs">(Der Magic-Link wird hier direkt angezeigt)</p>
        </div>
    </div>
</div>
{% endblock %}
