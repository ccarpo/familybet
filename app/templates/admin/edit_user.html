{% extends "base.html" %}

{% block title %}Benutzer bearbeiten - {{ target_user.name }} - FamilyBet{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold mb-6 text-center">✏️ Benutzer bearbeiten</h1>
        
        <form method="POST" action="{{ url_for('admin.edit_user', user_id=target_user.id) }}" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
                <input type="text" name="name" required value="{{ target_user.name }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" value="{{ target_user.email or '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="email@example.com">
            </div>
            
            <div class="flex items-center">
                <input type="checkbox" name="is_admin" id="is_admin" class="mr-2" {% if target_user.is_admin %}checked{% endif %}>
                <label for="is_admin" class="text-sm font-medium">Admin-Rechte</label>
            </div>
            
            <div class="pt-2 border-t">
                <div class="flex items-center justify-between text-sm">
                    <span class="text-gray-600">Gesamtpunkte:</span>
                    <span class="font-bold text-lg">{{ target_user.get_total_points() }}</span>
                </div>
            </div>
            
            <div class="flex gap-2">
                <button type="submit" 
                        class="flex-1 bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">
                    Speichern
                </button>
                <a href="{{ url_for('admin.index') }}" 
                   class="flex-1 bg-gray-300 text-gray-700 py-2 rounded-lg hover:bg-gray-400 transition text-center">
                    Abbrechen
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
