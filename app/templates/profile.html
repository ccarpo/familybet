{% extends "base.html" %}

{% block title %}Profil - FamilyBet{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold mb-6 text-center">👤 Mein Profil</h1>
        
        <form method="POST" action="{{ url_for('main.profile') }}" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
                <input type="text" name="name" required value="{{ user.name }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" value="{{ user.email or '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="deine@email.de">
                <p class="text-xs text-gray-500 mt-1">Email wird für den Login benötigt</p>
            </div>
            
            <div class="pt-2 border-t">
                <div class="flex items-center justify-between text-sm">
                    <span class="text-gray-600">Gesamtpunkte:</span>
                    <span class="font-bold text-lg">{{ user.get_total_points() }}</span>
                </div>
            </div>
            
            <button type="submit" 
                    class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                Profil speichern
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="{{ url_for('main.dashboard') }}" class="text-blue-600 text-sm hover:underline">
                ← Zurück zum Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
