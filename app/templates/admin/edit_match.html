{% extends "base.html" %}

{% block title %}Spiel bearbeiten - FamilyBet Admin{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-4">
        <a href="{{ url_for('admin.edit_groups') }}" class="text-blue-600 hover:underline">← Zurück zur Gruppenübersicht</a>
    </div>

    <h1 class="text-2xl font-bold mb-6">✏️ Spiel bearbeiten</h1>

    <div class="bg-white rounded-lg shadow-md p-6">
        <div class="mb-6 p-4 bg-gray-50 rounded">
            <div class="flex items-center justify-between text-lg font-semibold">
                <span>{{ match.team1_name }}</span>
                <span class="text-gray-500">vs</span>
                <span>{{ match.team2_name }}</span>
            </div>
            <div class="text-center text-gray-600 mt-2">
                {{ match.round_name }}
            </div>
        </div>

        <form method="POST" class="space-y-4">
            <!-- Date & Time -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Datum</label>
                    <input type="date" name="match_date" 
                           value="{{ match.match_date.strftime('%Y-%m-%d') if match.match_date }}"
                           class="w-full border rounded px-3 py-2" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Uhrzeit</label>
                    <input type="time" name="match_time" 
                           value="{{ match.match_date.strftime('%H:%M') if match.match_date }}"
                           class="w-full border rounded px-3 py-2">
                </div>
            </div>

            <!-- Location -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Ort/Stadion</label>
                <input type="text" name="location" 
                       value="{{ match.location or '' }}"
                       class="w-full border rounded px-3 py-2"
                       placeholder="z.B. Olympiastadion Berlin">
            </div>

            <!-- Submit -->
            <div class="flex gap-3 pt-4">
                <button type="submit" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                    Speichern
                </button>
                <a href="{{ url_for('admin.edit_groups') }}" 
                   class="px-4 py-2 border rounded hover:bg-gray-100">
                    Abbrechen
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
